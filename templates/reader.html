{% extends "base.html" %}

{% block content %}
<style>
    /* Light Mode Overrides */
    body.light-theme {
        --bg-color: #ffffff;
        --box-bg: #f9f9f9;
        --text-color: #333333;
        --border-color: #eeeeee;
    }
    
    body.light-theme .circle-btn {
        background-color: #ffffff;
        color: #333333;
        border-color: #dddddd;
    }

    body.light-theme .circle-btn:hover {
        background-color: #eeeeee;
    }
    
    /* Clean, open reader style (No Box) */
    .reader-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 20px;
        font-size: 19px; /* Slightly larger for readability */
        line-height: 2.0; /* Spacious line height */
        margin-bottom: 120px; /* Space for the bottom toolbar */
    }

    /* Make images responsive */
    .reader-container img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin: 20px 0;
        display: block;
    }

    /* Status Box Styling */
    .status-box {
        background-color: var(--box-bg);
        border: 1px solid var(--border-color);
        padding: 10px 15px;
        border-radius: 8px;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .raw-text {
        color: #888;
        font-size: 15px;
        margin-bottom: 30px;
        padding: 20px;
        background-color: rgba(0,0,0,0.1);
        border-radius: 8px;
        display: none;
    }

    body.light-theme .raw-text {
        background-color: #f4f4f4;
        color: #666;
    }

    /* Bottom Navigation Toolbar */
    .bottom-toolbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: var(--box-bg);
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        z-index: 100;
        box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
    }

    .nav-group { display: flex; gap: 15px; align-items: center; }
    
    .chapter-info { text-align: center; display: flex; flex-direction: column; }
    
    .chapter-info .subtext { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

    .circle-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        background-color: #2a2a2a;
        color: var(--text-color);
        display: inline-flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        cursor: pointer;
        font-size: 18px;
        transition: 0.2s;
    }

    .circle-btn:hover { background-color: #3a3a3a; }
    .circle-btn.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

    @media (max-width: 768px) {
        .bottom-toolbar { padding: 10px 15px; }
        .circle-btn { width: 38px; height: 38px; font-size: 16px; }
        .chapter-info { font-size: 14px; }
        .chapter-info strong { display: none; } /* Hide book title on small screens to save space */
    }
</style>

<div class="reader-container">
    <h2 style="margin-bottom: 25px;">{{ chapter.chapter_title }}</h2>
    
    <div id="statusBox" class="status-box">
        <div>Status: <span id="statusText" style="color: #a855f7;">Waiting to Start...</span></div>
        <div>Tokens Used: <span id="tokenCount">0</span></div>
    </div>

    <div id="rawContent" style="display: none;">
        {{ chapter.content | safe }}
    </div>

    <button onclick="toggleRaw()" class="btn-secondary" style="margin-bottom: 30px; font-size: 12px; padding: 6px 12px;">Show/Hide Raw Korean</button>
    <div id="rawDisplay" class="raw-text"></div>

    <div id="translationOutput" style="min-height: 400px;"></div>
</div>

<div class="bottom-toolbar">
    <div class="nav-group">
        <a href="{% if chapter.chapter_number > 1 %}{{ url_for('read', book_id=book.id, chapter_num=chapter.chapter_number - 1) }}{% else %}#{% endif %}" 
           class="circle-btn {% if chapter.chapter_number == 1 %}disabled{% endif %}" title="Previous Chapter">&lt;</a>
        
        <a href="{{ url_for('book_details', book_id=book.id) }}" class="circle-btn" title="Table of Contents">⌂</a>
    </div>

    <div class="chapter-info">
        <span class="subtext">CHAPTER {{ chapter.chapter_number }} / {{ total }}</span>
        <strong>{{ book.raw_filename }}</strong>
    </div>

    <div class="nav-group">
        <button id="retranslateBtn" class="circle-btn" title="Retranslate (Click to cancel and restart)">↻</button>
        <button id="themeToggleBtn" class="circle-btn" title="Toggle Light/Dark Mode">☽</button>
        
        <a href="{% if chapter.chapter_number < total %}{{ url_for('read', book_id=book.id, chapter_num=chapter.chapter_number + 1) }}{% else %}#{% endif %}" 
           class="circle-btn {% if chapter.chapter_number == total %}disabled{% endif %}" title="Next Chapter">&gt;</a>
    </div>
</div>

<script>
    const rawContentDiv = document.getElementById('rawContent');
    const rawDisplayDiv = document.getElementById('rawDisplay');
    
    let cleanedRawText = rawContentDiv.innerHTML.replace(/&lt;br\s*\/&gt;|<br\s*\/?>/gi, '<br><br>');
    rawDisplayDiv.innerHTML = cleanedRawText;

    function toggleRaw() {
        rawDisplayDiv.style.display = (rawDisplayDiv.style.display === 'none') ? 'block' : 'none';
    }

    const themeBtn = document.getElementById('themeToggleBtn');
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        themeBtn.innerText = '☀';
    }

    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        if (document.body.classList.contains('light-theme')) {
            localStorage.setItem('theme', 'light');
            themeBtn.innerText = '☀';
        } else {
            localStorage.setItem('theme', 'dark');
            themeBtn.innerText = '☽';
        }
    });

    const translationOutput = document.getElementById('translationOutput');
    const retranslateBtn = document.getElementById('retranslateBtn');
    
    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    const tokenCount = document.getElementById('tokenCount');

    // NEW: AbortController allows us to cancel ongoing translations
    let fetchController = null;

    async function startTranslation() {
        // If a translation is already running, kill it!
        if (fetchController) {
            fetchController.abort();
        }
        
        // Create a new controller for this attempt
        fetchController = new AbortController();
        const signal = fetchController.signal;
        
        // Reset UI
        statusBox.style.backgroundColor = 'var(--box-bg)';
        statusBox.style.borderColor = 'var(--border-color)';
        statusText.style.color = '#a855f7';
        statusText.innerText = 'Translating...';
        tokenCount.innerText = '0';
        
        let fullTranslationText = ""; 
        translationOutput.innerHTML = ""; 
        
        try {
            const response = await fetch("{{ url_for('translate_stream') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chapter_id: {{ chapter.id }} }),
                signal: signal // Attach the kill switch
            });
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let done = false;
            
            while (!done) {
                const { value, done: doneReading } = await reader.read();
                done = doneReading;
                const chunkValue = decoder.decode(value);
                
                const lines = chunkValue.split('\n\n');
                for (let line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.replace('data: ', '').trim();
                        if (dataStr) {
                            try {
                                const data = JSON.parse(dataStr);
                                
                                if (data.text) {
                                    fullTranslationText += data.text;
                                    translationOutput.innerHTML = fullTranslationText;
                                }
                                
                                if (data.tokens) tokenCount.innerText = data.tokens;
                                if (data.status) {
                                    statusText.innerText = data.status;
                                    if (data.status === 'Completed') {
                                        statusBox.style.backgroundColor = 'rgba(74, 222, 128, 0.1)';
                                        statusBox.style.borderColor = '#4ade80';
                                        statusText.style.color = '#4ade80';
                                    }
                                }
                                
                                if (data.error) {
                                    translationOutput.innerHTML += `<br><br><span style="color:#f87171">Error: ${data.error}</span>`;
                                }
                            } catch (e) {
                                console.error("Error parsing chunk:", e);
                            }
                        }
                    }
                }
            }
        } catch (error) {
            // Check if the error was just us cancelling the stream
            if (error.name === 'AbortError') {
                console.log('Previous translation aborted.');
            } else {
                statusText.innerText = "Connection Failed";
                statusText.style.color = '#f87171';
                translationOutput.innerHTML += `<br><br><span style="color:#f87171">Connection failed. Please refresh.</span>`;
            }
        } finally {
            // Clear the controller when finished natively
            if (fetchController && fetchController.signal.aborted === false && statusText.innerText === 'Completed') {
                 fetchController = null;
            }
        }
    }

    window.addEventListener('DOMContentLoaded', startTranslation);
    // Retranslate button is no longer disabled, it will trigger startTranslation (which aborts the old one)
    retranslateBtn.addEventListener('click', startTranslation);
</script>
{% endblock %}
