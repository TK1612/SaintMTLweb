{% extends "base.html" %}

{% block content %}
<style>
    /* Light Mode Overrides */
    body.light-theme {
        --bg-color: #f4f4f9;
        --box-bg: #ffffff;
        --text-color: #000000;
        --border-color: #dddddd;
    }
    
    .reader-container {
        font-size: 18px;
        line-height: 1.6;
        padding: 30px;
    }
    
    .reader-controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
    }
</style>

<div class="reader-controls">
    <a href="{{ url_for('book_details', book_id=book.id) }}" class="btn-secondary">&larr; Back to Chapters</a>
    <button id="themeToggle" class="btn-secondary">Switch to Light Mode</button>
</div>

<div class="box reader-container">
    <h2>{{ chapter.chapter_title }}</h2>
    
    <div id="content-area">
        {{ chapter.content | safe }}
    </div>
</div>

<div class="reader-controls" style="margin-top: 20px;">
    {% if chapter.chapter_number > 1 %}
    <a href="{{ url_for('read', book_id=book.id, chapter_num=chapter.chapter_number - 1) }}" class="btn">&larr; Previous</a>
    {% else %}
    <div></div>
    {% endif %}
    
    {% if chapter.chapter_number < total %}
    <a href="{{ url_for('read', book_id=book.id, chapter_num=chapter.chapter_number + 1) }}" class="btn">Next &rarr;</a>
    {% endif %}
</div>

<script>
    // Theme Toggling Logic
    const themeBtn = document.getElementById('themeToggle');
    
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        
        if (document.body.classList.contains('light-theme')) {
            themeBtn.innerText = "Switch to Dark Mode";
        } else {
            themeBtn.innerText = "Switch to Light Mode";
        }
    });
</script>
{% endblock %}
