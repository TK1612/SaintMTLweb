{% extends "base.html" %}

{% block content %}
<div class="box">
    <h2>Admin Dashboard</h2>
    
    {% if current_user.is_admin %}
        <p style="margin-bottom: 25px;">Current Status: 
            <strong style="color: {% if status == 'online' %}#4ade80{% else %}#f87171{% endif %};">
                {{ status | default('online') | title }}
            </strong>
        </p>

        <form action="{{ url_for('admin') }}" method="POST">
            <div style="margin-bottom: 15px;">
                <label for="admin_password" style="display: block; margin-bottom: 8px;">Admin Password:</label>
                <input type="password" id="admin_password" name="password" style="max-width: 300px;" required>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="website_state" style="display: block; margin-bottom: 8px;">Set Website State:</label>
                <select id="website_state" name="status" style="max-width: 150px;">
                    <option value="online">Online</option>
                    <option value="offline">Offline</option>
                </select>
            </div>

            <button type="submit" class="btn-secondary">Update Status</button>
        </form>
    {% else %}
        <div style="padding: 20px; background-color: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px;">
            <p style="color: #f87171; margin: 0;"><strong>Access Denied:</strong> You do not possess site modification abilities.</p>
        </div>
    {% endif %}
    
    <div style="margin-top: 30px;">
        <a href="{{ url_for('index') }}" style="color: #a855f7; text-decoration: none;">&larr; Back to Dashboard</a>
    </div>
</div>
{% endblock %}
