<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPUB App</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd;
        }
        .active-users { font-size: 14px; color: #555; }
        .user-menu { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute; right: 0; background-color: #fff;
            min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1;
        }
        .user-menu:hover .dropdown-content { display: block; }
        .dropdown-content a, .dropdown-content div {
            color: black; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer;
        }
        .dropdown-content a:hover, .dropdown-content div:hover { background-color: #f1f1f1; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="active-users">Current Users Active: {{ active_count }}</div>
        {% if current_user.is_authenticated %}
        <div class="user-menu">
            <span>{{ current_user.username }} <strong>&#8942;</strong></span>
            <div class="dropdown-content">
                <div onclick="document.getElementById('profileModal').style.display='block'">Edit Profile / Prompt</div>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
        {% endif %}
    </div>

    {% if current_user.is_authenticated %}
    <div id="profileModal" style="display:none; position:fixed; top:20%; left:30%; background:#fff; padding:20px; border:1px solid #ccc; z-index:100;">
        <h3>Edit Default Prompt</h3>
        <form method="POST" action="/profile">
            <textarea name="custom_prompt" rows="4" cols="50">{{ current_user.custom_prompt }}</textarea><br><br>
            <button type="submit">Save</button>
            <button type="button" onclick="document.getElementById('profileModal').style.display='none'">Close</button>
        </form>
    </div>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
