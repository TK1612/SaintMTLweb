{% extends "base.html" %}

{% block content %}
<style>
    .book-layout {
        display: flex;
        gap: 30px;
        align-items: flex-start;
    }
    .book-cover-col {
        flex: 0 0 250px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .book-cover {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }
    .toc-col {
        flex: 1;
        background-color: var(--box-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
    }
    .toc-list {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 500px; /* Makes the chapter list scrollable */
        overflow-y: auto;
    }
    .toc-list li {
        border-bottom: 1px solid var(--border-color);
    }
    .toc-list a {
        display: block;
        padding: 12px 10px;
        color: var(--text-color);
        text-decoration: none;
        transition: background-color 0.2s;
    }
    .toc-list a:hover {
        background-color: #2a2a2a;
    }
    /* Mobile Stack */
    @media (max-width: 768px) {
        .book-layout { flex-direction: column; }
        .book-cover-col { width: 100%; max-width: 300px; margin: 0 auto; }
    }
</style>

<div class="book-layout">
    <div class="book-cover-col">
        <img src="{{ url_for('static', filename=book.cover_image) }}" alt="Cover" class="book-cover">
        
        <a href="{{ url_for('read', book_id=book.id, chapter_num=current_chapter) }}" class="btn" style="text-align: center; font-weight: bold; padding: 12px;">
            {% if current_chapter > 1 %}CONTINUE READING{% else %}START READING{% endif %}
        </a>
    </div>

    <div class="toc-col">
        <h2 style="margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">{{ book.translated_title }}</h2>
        <h4 style="color: #aaa;">Table of Contents</h4>
        
        <ul class="toc-list">
            {% for chapter in chapters %}
            <li>
                <a href="{{ url_for('read', book_id=book.id, chapter_num=chapter.chapter_number) }}">
                    {{ chapter.chapter_title }}
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
